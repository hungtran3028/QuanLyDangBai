<!doctype html>
<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sao Việt - Content Studio</title>
    <script>

          theme: {

                "secondary-fixed": "#ffddb8",

                "on-primary-container": "#a8b8ff",

                "tertiary-fixed": "#89f5e7",

                "surface-tint": "#3755c3",
                "surface-container-lowest": "#ffffff",
                "on-background": "#0b1c30",
                "on-surface-variant": "#444653",
                "surface-dim": "#cbdbf5",
                "on-secondary": "#ffffff",
                "primary-fixed-dim": "#b8c4ff",

                "on-secondary-fixed": "#2a1700",
                primary: "#00288e",
                background: "#f8f9ff",

                "on-secondary-container": "#684000",
                "primary-container": "#1e40af",

                "inverse-primary": "#b8c4ff",
                "on-tertiary-fixed-variant": "#005049",
                secondary: "#855300",
                "surface-bright": "#f8f9ff",
                "tertiary-container": "#00554e",
              },
              borderRadius: {
                DEFAULT: "0.125rem",
                lg: "0.25rem",

              },
              spacing: {
                lg: "24px",
                xl: "32px",
                base: "4px",
                sm: "8px",
                xs: "4px",
                sidebar_width: "260px",
                gutter: "16px",
                md: "16px",
              },
              fontFamily: {
                "body-lg": ["Inter"],
                "body-md": ["Inter"],
                "display-lg": ["Inter"],

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = window.__TAILWIND_CONFIG;
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="font-body-md text-body-md text-on-surface bg-background antialiased flex h-screen overflow-hidden">
    <nav class="w-sidebar_width h-screen fixed left-0 top-0 bg-surface-container-lowest border-r border-outline-variant flex flex-col py-md z-20">
      <div class="px-md mb-lg flex items-center gap-sm">
        <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-on-primary">
          <span class="material-symbols-outlined text-[20px] icon-fill">star</span>
        </div>
        <div>
          <h1 class="font-headline-md text-headline-md font-bold text-primary">Sao Việt</h1>
          <p class="font-label-md text-label-md text-on-surface-variant">Content Studio</p>
        </div>
      </div>

      <div class="flex-1 px-sm flex flex-col gap-xs">
        <a class="nav-link" data-view="dashboard" href="#/dashboard">
          <span class="material-symbols-outlined">dashboard</span>
          <span>Dashboard</span>
        </a>
        <a class="nav-link" data-view="detail" href="#/detail">
          <span class="material-symbols-outlined">article</span>
          <span>Post Detail</span>
        </a>
        <a class="nav-link" data-view="history" href="#/history">
          <span class="material-symbols-outlined">history</span>
          <span>History</span>
        </a>
        <a class="nav-link" data-view="media" href="#/media">
          <span class="material-symbols-outlined">perm_media</span>
          <span>Media Library</span>
        </a>
        <a class="nav-link" data-view="prompt" href="#/prompt">
          <span class="material-symbols-outlined">psychology</span>
          <span>Prompt Generator</span>
        </a>
        <a class="nav-link" data-view="facebook" href="#/facebook">
          <span class="material-symbols-outlined">settings</span>
          <span>Settings</span>
        </a>
      </div>
    </nav>

    <div class="flex-1 ml-sidebar_width flex flex-col h-screen w-[calc(100%-260px)] relative">
      <header class="bg-surface docked full-width top-0 h-16 border-b border-outline-variant flex justify-between items-center px-lg z-10">
        <div id="viewTitle" class="font-headline-sm text-headline-sm font-semibold text-on-surface">Dashboard</div>
        <div class="flex items-center space-x-md text-on-surface-variant">
          <button id="connectionStatus" class="hover:text-primary transition-opacity duration-150 flex items-center gap-sm" type="button">
            <span class="w-2 h-2 rounded-full bg-tertiary-fixed-dim"></span>
            <span class="font-label-sm text-label-sm">Connection Status</span>
          </button>
          <div class="w-px h-6 bg-outline-variant"></div>
          <button id="refreshBtn" class="hover:text-primary transition-opacity duration-150 cursor-pointer flex items-center" type="button" title="Tải lại">
            <span class="material-symbols-outlined">refresh</span>
          </button>
          <button class="hover:text-primary transition-opacity duration-150 cursor-pointer flex items-center" type="button">
            <span class="material-symbols-outlined">account_circle</span>
          </button>
          <select id="topPageSelect" class="font-label-sm text-label-sm bg-surface-container-low px-sm py-xs rounded border border-outline-variant ml-sm max-w-[260px]" disabled>
            <option>Page Selector</option>
          </select>
        </div>
      </header>

      <main id="viewRoot" class="flex-1 overflow-auto p-gutter bg-background flex flex-col gap-gutter"></main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="./script.js"></script>
  </body>
</html>
